name: JQOneMatrix Honeypot

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps + hosts poison + self-signed TLS
        shell: powershell
        run: |
          $hosts = "$env:SystemRoot\System32\drivers\etc\hosts"
          Add-Content -Path $hosts -Value "127.0.0.1 jqone.tech" -Force
          Add-Content -Path $hosts -Value "127.0.0.1 api.jqone.tech" -Force
          Write-Host "[+] Hosts poisoned"

          $cert = New-SelfSignedCertificate -DnsName "api.jqone.tech","jqone.tech" `
            -CertStoreLocation "cert:\LocalMachine\My" `
            -KeyExportPolicy Exportable `
            -NotAfter (Get-Date).AddDays(30)

          $pwd = ConvertTo-SecureString -String "honeypot" -Force -AsPlainText
          $pfxPath = "$env:RUNNER_TEMP\api.jqone.tech.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null

          $store = New-Object System.Security.Cryptography.X509Certificates.X509Store("Root","LocalMachine")
          $store.Open("ReadWrite")
          $store.Add($cert)
          $store.Close()
          Write-Host "[+] CA trusted"

          $certPem = "$env:RUNNER_TEMP\cert.pem"
          $keyPem = "$env:RUNNER_TEMP\key.pem"
          openssl pkcs12 -in "$pfxPath" -passin pass:honeypot -nokeys -out "$certPem" 2>$null
          openssl pkcs12 -in "$pfxPath" -passin pass:honeypot -nocerts -nodes -out "$keyPem" -passout pass: 2>$null
          Write-Host "[+] PEM cert+key ready at $certPem"

          "CERT_PEM=$certPem" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "KEY_PEM=$keyPem" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Start Honeypots
        shell: powershell
        run: |
          $p = Start-Process -FilePath python -ArgumentList "honeypot.py --port 80 --db http.db" -NoNewWindow -PassThru
          Write-Host "[+] HTTP honeypot PID=$($p.Id)"
          $p2 = Start-Process -FilePath python -ArgumentList "honeypot.py --port 443 --db https.db --tls-cert $env:CERT_PEM --tls-key $env:KEY_PEM" -NoNewWindow -PassThru
          Write-Host "[+] HTTPS honeypot PID=$($p2.Id)"
          Start-Sleep -Seconds 3

      - name: Download and Run JQOneMatrixN
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/RobinRegister/prmuzieo/releases/download/v1.0/JQOneMatrixN.exe" -OutFile "jqone.exe"
          Write-Host "[+] Downloaded $( (Get-Item jqone.exe).length ) bytes"
          $p = Start-Process -FilePath ".\jqone.exe" -NoNewWindow -PassThru
          Write-Host "[+] Launched PID=$($p.Id)"

      - name: Wait for capture
        shell: powershell
        run: |
          Write-Host "[+] Waiting 90 seconds..."
          Start-Sleep -Seconds 90

      - name: Dump HTTP captures
        shell: powershell
        run: |
          try { $stats = Invoke-RestMethod -Uri "http://127.0.0.1:80/_admin/stats" } catch { $stats = "FAILED: $_" }
          try { $creds = Invoke-RestMethod -Uri "http://127.0.0.1:80/_admin/creds" } catch { $creds = "FAILED: $_" }
          Write-Host "=== HTTP STATS ==="
          $stats | ConvertTo-Json -Depth 10
          Write-Host "=== HTTP CREDS ==="
          $creds | ConvertTo-Json -Depth 10

      - name: Dump HTTPS captures
        shell: powershell
        run: |
          # Trust all certs for local self-signed
          [System.Net.ServicePointManager]::ServerCertificateValidationCallback = { $true }
          try { $stats = Invoke-RestMethod -Uri "https://127.0.0.1:443/_admin/stats" } catch { $stats = "FAILED: $($_.Exception.Message)" }
          try { $creds = Invoke-RestMethod -Uri "https://127.0.0.1:443/_admin/creds" } catch { $creds = "FAILED: $($_.Exception.Message)" }
          Write-Host "=== HTTPS STATS ==="
          $stats | ConvertTo-Json -Depth 10
          Write-Host "=== HTTPS CREDS ==="
          $creds | ConvertTo-Json -Depth 10

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: honeypot-captures
          path: |
            *.json
            *.db
            *.txt
