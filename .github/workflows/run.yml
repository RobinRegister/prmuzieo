name: JQOneMatrix Honeypot

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Hosts + TLS Cert + Portproxy + Honeypots + EXE
        shell: powershell
        run: |
          # Hosts poison
          $hosts = "$env:SystemRoot\System32\drivers\etc\hosts"
          Add-Content -Path $hosts -Value "127.0.0.1 jqone.tech" -Force
          Add-Content -Path $hosts -Value "127.0.0.1 api.jqone.tech" -Force
          Write-Host "[+] Hosts done"

          # Generate self-signed cert for TLS handshake
          $cert = New-SelfSignedCertificate -DnsName "jqone.tech","api.jqone.tech" `
            -CertStoreLocation "cert:\LocalMachine\My" `
            -KeyExportPolicy Exportable `
            -NotAfter (Get-Date).AddDays(30)
          $pwd = ConvertTo-SecureString -String "honeypot" -Force -AsPlainText
          $pfxPath = "$env:RUNNER_TEMP\api.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null
          $certPem = "$env:RUNNER_TEMP\cert.pem"
          $keyPem = "$env:RUNNER_TEMP\key.pem"
          openssl pkcs12 -in "$pfxPath" -passin pass:honeypot -nokeys -out "$certPem" 2>$null
          openssl pkcs12 -in "$pfxPath" -passin pass:honeypot -nocerts -nodes -out "$keyPem" -passout pass: 2>$null
          # Trust it so EXE doesn't reject
          $store = New-Object System.Security.Cryptography.X509Certificates.X509Store("Root","LocalMachine")
          $store.Open("ReadWrite")
          $store.Add($cert)
          $store.Close()
          Write-Host "[+] TLS cert ready"

          # Portproxy: 80→8080 (HTTP), 443→8443 (RPC)
          netsh interface portproxy add v4tov4 listenport=80 listenaddress=127.0.0.1 connectport=8080 connectaddress=127.0.0.1
          netsh interface portproxy add v4tov4 listenport=443 listenaddress=127.0.0.1 connectport=8443 connectaddress=127.0.0.1
          Write-Host "[+] Portproxy set"

          # Start HTTP honeypot on 8080
          Start-Process -FilePath python -ArgumentList "honeypot.py --port 8080 --db http.db" -NoNewWindow
          Start-Sleep -Seconds 2
          try { Invoke-RestMethod "http://127.0.0.1:8080/_admin/stats" -TimeoutSec 3 | Out-Null; Write-Host "[+] HTTP honeypot OK" } catch { Write-Host "[-] HTTP FAIL: $_" }

          # Start TCP+TLS honeypot on 8443 with cert
          Start-Process -FilePath python -ArgumentList "tcp_honeypot.py --port 8443 --db rpc.db --tls --cert $certPem --key $keyPem" -NoNewWindow
          Start-Sleep -Seconds 2
          netstat -ano | findstr "8443"

          # Download EXE
          Invoke-WebRequest -Uri "https://github.com/RobinRegister/prmuzieo/releases/download/v1.0/JQOneMatrixN.exe" -OutFile "jqone.exe"
          Write-Host "[+] Downloaded $( (Get-Item jqone.exe).length ) bytes"

          # Launch EXE
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = (Join-Path (Get-Location) "jqone.exe")
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.CreateNoWindow = $true
          $exeProc = [System.Diagnostics.Process]::Start($psi)
          $exePid = $exeProc.Id
          Write-Host "[+] EXE PID=$exePid"

          # Poll every 5s for 90s
          for ($i=0; $i -lt 18; $i++) {
            Start-Sleep -Seconds 5
            if ($exeProc.HasExited) { Write-Host "[+] EXE exited at +$($i*5)s code=$($exeProc.ExitCode)"; break }
            $conns = netstat -ano | Select-String "$exePid"
            if ($conns) { Write-Host "  [t+$($i*5)s] $(($conns -join ' | ').Substring(0, [Math]::Min(300, ($conns -join ' | ').Length)))" }
          }

          $stdout = $exeProc.StandardOutput.ReadToEnd()
          $stderr = $exeProc.StandardError.ReadToEnd()
          if (-not $exeProc.HasExited) { $exeProc.Kill() }
          Write-Host "[+] Exit code: $($exeProc.ExitCode)"
          if ($stdout) { Write-Host "STDOUT: $stdout" }
          if ($stderr) { Write-Host "STDERR: $stderr" }

      - name: Wait 60s more
        shell: powershell
        run: Start-Sleep -Seconds 60

      - name: Dump captures
        if: always()
        shell: powershell
        run: |
          Write-Host "=== HTTP Honeypot ==="
          try { $s = Invoke-RestMethod "http://127.0.0.1:8080/_admin/stats" -TimeoutSec 3; Write-Host "Stats: $($s|ConvertTo-Json -Compress)"; $c = Invoke-RestMethod "http://127.0.0.1:8080/_admin/creds" -TimeoutSec 3; Write-Host "Creds: $($c|ConvertTo-Json -Depth 3 -Compress)" } catch { Write-Host "HTTP: $_" }

          Write-Host "=== TCP+TLS Honeypot ==="
          python dump_rpc.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: honeypot-captures
          path: |
            *.db
            *.txt
