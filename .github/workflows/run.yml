name: Crack JQOneMatrixN

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Download EXE
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/RobinRegister/prmuzieo/releases/download/v1.0/JQOneMatrixN.exe" -OutFile "jqone.exe"
          Write-Host "[+] EXE: $((Get-Item jqone.exe).length) bytes"

      - name: Extract Single-File Bundle
        shell: powershell
        run: |
          # Compile and run our bundle extractor
          $refs = @("System.dll", "System.Core.dll")
          $refArgs = ($refs | ForEach-Object { "/r:`"$_`"" }) -join " "
          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          if (-not (Test-Path $csc)) {
            Write-Host "[-] csc not found, using dotnet"
            # Build with dotnet SDK
            mkdir extractor -Force
            cd extractor
            dotnet new console --force 2>&1 | Out-Null
            Copy-Item -Force ..\BundleExtractor.cs Program.cs
            dotnet run -c Release -- ..\jqone.exe 2>&1
            cd ..
            if (Test-Path "extracted_asm\*.dll") { exit 0 }
          } else {
            & $csc /out:BundleExtractor.exe BundleExtractor.cs /t:exe 2>&1
            .\BundleExtractor.exe jqone.exe 2>&1
          }

          if (-not (Test-Path "extracted_asm\*.dll")) {
            Write-Host "[-] Bundle extraction failed, trying sfextract..."
            dotnet tool install -g sfextract 2>&1 | Select-Object -Last 3
            sfextract jqone.exe -o extracted_asm 2>&1
          }

          Write-Host "=== Extracted ==="
          Get-ChildItem extracted_asm -Filter "*.dll" -ErrorAction SilentlyContinue |
            Sort-Object Length -Descending |
            Select-Object Name, @{N='KB';E={[math]::Round($_.Length/1KB)}} |
            Format-Table -AutoSize

      - name: Scan DLLs for License Strings
        shell: powershell
        run: |
          if (-not (Test-Path "extracted_asm\*.dll")) { exit 0 }
          Get-ChildItem extracted_asm -Filter "*.dll" | Sort-Object Length -Descending | ForEach-Object {
            Write-Host "=== $($_.Name) ($([math]::Round($_.Length/1KB))KB) ==="
            $bytes = [IO.File]::ReadAllBytes($_.FullName)
            $text = [Text.Encoding]::Unicode.GetString($bytes)
            foreach ($kw in @("VerifySignature","IsRegisterValid","TGLicense","License","BEGIN PUBLIC","RSAKeyValue","Modulus","BouncyCastle","ECDsa","ProduceLicense","MaxAccounts","register_time")) {
              if ($text -imatch $kw) {
                $idx = $text.IndexOf($kw)
                $start = [Math]::Max(0, $idx - 20)
                $len = [Math]::Min(120, $text.Length - $start)
                Write-Host "  [$kw] ...$($text.Substring($start, $len) -replace '[^\x20-\x7E]','.')..."
              }
            }
          }

      - name: Build + Run Patcher
        shell: powershell
        run: |
          $targets = @(Get-ChildItem extracted_asm -Filter "*.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notlike "System.*" -and $_.Name -notlike "Microsoft.*" -and $_.Name -notlike "netstandard.*" } |
            Sort-Object Length -Descending)
          if ($targets.Count -eq 0) { $targets = @(Get-ChildItem extracted_asm -Filter "*.dll") }
          if ($targets.Count -eq 0) { Write-Host "[-] No DLLs"; exit 1 }
          
          Write-Host "[+] Targets: $($targets.Count) DLLs"
          
          mkdir patcher -Force
          cd patcher
          dotnet new console --force 2>&1 | Out-Null
          dotnet add package dnlib 2>&1 | Out-Null
          Copy-Item -Force ..\Patcher.cs Program.cs
          dotnet build -c Release 2>&1 | Select-Object -Last 5
          
          if ($LASTEXITCODE -ne 0) { Write-Host "[-] Build FAILED"; exit 1 }
          Write-Host "[+] Built OK"
          
          foreach ($dll in $targets) {
            Write-Host "--- $($dll.Name) ---"
            dotnet run -c Release -- $dll.FullName 2>&1 | Select-Object -First 40
          }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cracked-output
          path: |
            *_cracked.dll
            extracted_asm/
