name: JQOneMatrix Net Trace

on:
  workflow_dispatch:

jobs:
  trace:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Hosts poison + portproxy 80→8080
        shell: powershell
        run: |
          $hosts = "$env:SystemRoot\System32\drivers\etc\hosts"
          Add-Content -Path $hosts -Value "127.0.0.1 jqone.tech" -Force
          Add-Content -Path $hosts -Value "127.0.0.1 api.jqone.tech" -Force
          Add-Content -Path $hosts -Value "127.0.0.1 www.jqone.tech" -Force
          netsh interface portproxy add v4tov4 listenport=80 listenaddress=127.0.0.1 connectport=8080 connectaddress=127.0.0.1

      - name: Start HTTP + TCP Honeypots
        shell: powershell
        run: |
          Start-Process -FilePath python -ArgumentList "honeypot.py --port 8080 --db http.db" -NoNewWindow
          foreach ($p in @(443, 8443, 9443, 4443, 5222, 10808, 3000, 8081, 9090)) {
            Start-Process -FilePath python -ArgumentList "tcp_honeypot.py --port $p --db rpc_$p.db" -NoNewWindow
          }
          Start-Sleep -Seconds 3
          netstat -ano | findstr "LISTENING"

      - name: Run EXE + capture netstat
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/RobinRegister/prmuzieo/releases/download/v1.0/JQOneMatrixN.exe" -OutFile "jqone.exe"
          Write-Host "[+] Downloaded"

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = "$pwd\jqone.exe"
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.CreateNoWindow = $true
          $exeProc = [System.Diagnostics.Process]::Start($psi)
          $exePid = $exeProc.Id
          Write-Host "[+] EXE PID=$exePid"

          # Poll netstat every 5s for 90s
          for ($i=0; $i -lt 18; $i++) {
            Start-Sleep -Seconds 5
            if ($exeProc.HasExited) { Write-Host "[+] EXE exited at +$($i*5)s code=$($exeProc.ExitCode)"; break }
            $conns = netstat -ano | Select-String "^\s*TCP.*($exePid|LISTENING)"
            if ($conns) { Write-Host "  [t+$($i*5)s] $($conns -join ' | ')" }
          }

          $stdout = $exeProc.StandardOutput.ReadToEnd()
          $stderr = $exeProc.StandardError.ReadToEnd()
          if (-not $exeProc.HasExited) { $exeProc.Kill(); Write-Host "[+] Killed" }
          Write-Host "[+] Final exit=$($exeProc.ExitCode)"
          if ($stdout) { Write-Host "STDOUT: $stdout" }
          if ($stderr) { Write-Host "STDERR: $stderr" }

      - name: Final netstat
        if: always()
        shell: powershell
        run: |
          Write-Host "=== LISTENING ==="
          netstat -ano | findstr "LISTENING"
          Write-Host "=== ESTABLISHED ==="
          netstat -ano | findstr "ESTABLISHED"
          Write-Host "=== HOSTS ==="
          Get-Content "$env:SystemRoot\System32\drivers\etc\hosts" | Select-String "jqone"

      - name: Dump all DBs
        if: always()
        shell: powershell
        run: |
          python dump_tcp.py
          try { $s = Invoke-RestMethod "http://127.0.0.1:8080/_admin/stats" -TimeoutSec 3; Write-Host "HTTP: $($s|ConvertTo-Json -Compress)" } catch { Write-Host "HTTP: $_" }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: net-trace
          path: |
            *.db
            *.txt
