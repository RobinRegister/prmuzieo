name: JQOneMatrix Honeypot

on:
  workflow_dispatch:
  push:

jobs:
  capture:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps + hosts poison + self-signed TLS
        shell: powershell
        run: |
          # Hosts file redirection
          $hosts = "$env:SystemRoot\System32\drivers\etc\hosts"
          Add-Content -Path $hosts -Value "127.0.0.1 jqone.tech" -Force
          Add-Content -Path $hosts -Value "127.0.0.1 api.jqone.tech" -Force
          Write-Host "[+] Hosts poisoned"
          Get-Content $hosts | Select-String "jqone"

          # Self-signed cert for TLS interception
          $cert = New-SelfSignedCertificate -DnsName "api.jqone.tech","jqone.tech" `
            -CertStoreLocation "cert:\LocalMachine\My" `
            -KeyExportPolicy Exportable `
            -NotAfter (Get-Date).AddDays(30)

          # Export to PFX for Python
          $pwd = ConvertTo-SecureString -String "honeypot" -Force -AsPlainText
          $pfxPath = "$env:RUNNER_TEMP\api.jqone.tech.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null

          # Trust as root CA
          $store = New-Object System.Security.Cryptography.X509Certificates.X509Store("Root","LocalMachine")
          $store.Open("ReadWrite")
          $store.Add($cert)
          $store.Close()
          Write-Host "[+] CA trusted"

          # Export cert+key as PEM for Python ssl
          $certPem = "$env:RUNNER_TEMP\cert.pem"
          $keyPem = "$env:RUNNER_TEMP\key.pem"
          openssl pkcs12 -in "$pfxPath" -passin pass:honeypot -nokeys -out "$certPem" 2>$null
          openssl pkcs12 -in "$pfxPath" -passin pass:honeypot -nocerts -nodes -out "$keyPem" -passout pass: 2>$null
          Write-Host "[+] PEM cert+key ready"

          # Persist paths
          "CERT_PEM=$certPem" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "KEY_PEM=$keyPem" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Start Honeypot HTTP
        shell: cmd
        run: |
          start /B python honeypot.py --port 80 --db http.db > http_log.txt 2>&1

      - name: Start Honeypot HTTPS
        shell: cmd
        run: |
          start /B python honeypot.py --port 443 --db https.db --tls-cert %CERT_PEM% --tls-key %KEY_PEM% > https_log.txt 2>&1

      - name: Wait for honeypots
        shell: cmd
        run: timeout /t 3 /nobreak > nul

      - name: Download and Run JQOneMatrixN
        shell: cmd
        run: |
          curl -sL -o jqone.exe ^
            "https://github.com/RobinRegister/prmuzieo/releases/download/v1.0/JQOneMatrixN.exe"
          echo [!] Running JQOneMatrixN...
          start /B jqone.exe > exe_log.txt 2>&1

      - name: Wait for capture
        shell: cmd
        run: timeout /t 120 /nobreak > nul

      - name: Dump HTTP captures
        shell: cmd
        run: |
          curl -s http://127.0.0.1:80/_admin/creds > http_creds.json 2>&1
          curl -s http://127.0.0.1:80/_admin/stats > http_stats.json 2>&1
          echo === HTTP STATS ===
          type http_stats.json
          echo === HTTP CREDS ===
          type http_creds.json

      - name: Dump HTTPS captures
        shell: cmd
        run: |
          curl -sk https://127.0.0.1:443/_admin/creds > https_creds.json 2>&1
          curl -sk https://127.0.0.1:443/_admin/stats > https_stats.json 2>&1
          echo === HTTPS STATS ===
          type https_stats.json
          echo === HTTPS CREDS ===
          type https_creds.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: honeypot-captures
          path: |
            *.json
            *.db
            *.txt
            *_log.txt
