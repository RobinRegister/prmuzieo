name: Crack JQOneMatrixN

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download EXE
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/RobinRegister/prmuzieo/releases/download/v1.0/JQOneMatrixN.exe" -OutFile "jqone.exe"
          Write-Host "[+] EXE: $((Get-Item jqone.exe).length) bytes"

      - name: Extract .NET Single-File Bundle
        shell: powershell
        run: |
          # Run the EXE briefly to trigger self-extraction to %TEMP%\.net
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = (Join-Path (Get-Location) "jqone.exe")
          $psi.UseShellExecute = $false
          $psi.CreateNoWindow = $true
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $proc = [System.Diagnostics.Process]::Start($psi)
          Start-Sleep -Seconds 8
          if (-not $proc.HasExited) { $proc.Kill() }
          Write-Host "[+] EXE ran for 8s"

          # Find extracted assemblies
          $extractRoot = "$env:LOCALAPPDATA\Temp\.net"
          if (-not (Test-Path $extractRoot)) { $extractRoot = "$env:TEMP\.net" }

          $dlls = Get-ChildItem -Path $extractRoot -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.Length -gt 100KB } |
            Sort-Object Length -Descending
          
          if ($dlls) {
            Write-Host "[+] Found $(@($dlls).Count) large DLLs in $extractRoot"
            mkdir extracted -Force
            $dlls | ForEach-Object { Copy-Item $_.FullName "extracted\" -Force }
          } else {
            Write-Host "[-] No DLLs at $extractRoot"
            Get-ChildItem "$env:TEMP\.net" -Recurse -Depth 3 -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize
          }

          Get-ChildItem extracted -Filter "*.dll" | Select-Object Name, Length | Format-Table -AutoSize

      - name: Install de4dot
        shell: powershell
        run: |
          dotnet tool install -g de4dot 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[*] de4dot already installed or failed, continuing..."
          } else {
            Write-Host "[+] de4dot installed"
          }

      - name: Deobfuscate
        shell: powershell
        run: |
          if (-not (Test-Path "extracted\*.dll")) {
            Write-Host "[-] No DLLs to deobfuscate. Listing temp..."
            Get-ChildItem "$env:TEMP\.net" -Recurse -Depth 2 -ErrorAction SilentlyContinue | Select-Object FullName -First 30
            # Try alternate location
            $alt = Get-ChildItem "$env:LOCALAPPDATA\Temp\.net" -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue
            if ($alt) { $alt | ForEach-Object { Copy-Item $_.FullName "extracted\" -Force } }
          }
          
          if (Test-Path "extracted\*.dll") {
            de4dot -r extracted -o deobfuscated --dont-rename 2>&1 | Select-Object -First 20
            Write-Host "[+] Deobfuscated"
            Get-ChildItem deobfuscated -Filter "*.dll" | Select-Object Name, Length | Format-Table -AutoSize
          }

      - name: Scan for License + Key Strings
        shell: powershell
        run: |
          $dir = if (Test-Path deobfuscated) { "deobfuscated" } elseif (Test-Path extracted) { "extracted" } else { $null }
          if (-not $dir) { Write-Host "[-] Nothing to scan"; exit 0 }
          
          Get-ChildItem $dir -Filter "*.dll" | ForEach-Object {
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            $text = [System.Text.Encoding]::Unicode.GetString($bytes)
            Write-Host "=== $($_.Name) ($($_.Length) bytes) ==="
            
            $hits = @("VerifySignature","IsRegisterValid","TGLicense","License",
                       "BEGIN PUBLIC","RSAKeyValue","Modulus","Exponent",
                       "BouncyCastle","ECDsa","ProduceLicense","MaxAccounts",
                       "register_time","ProductFeatures","Expiration","Feature",
                       "publicKey","PublicKey","PrivateKey","KeyPair")
            
            foreach ($h in $hits) {
              if ($text -match $h) {
                $idx = $text.IndexOf($h)
                $ctx = $text.Substring([Math]::Max(0,$idx-40), [Math]::Min(120, $text.Length - [Math]::Max(0,$idx-40)))
                Write-Host "  [$h] $ctx"
              }
            }
          }

      - name: Build Patcher + Run
        shell: powershell
        run: |
          $patcherDir = "patcher"
          mkdir $patcherDir -Force
          cd $patcherDir
          
          # Create project skeleton
          dotnet new console --force 2>$null
          dotnet add package dnlib --version 4.4.0 2>&1 | Select-Object -Last 3
          
          # Overwrite auto-generated Program.cs with our patcher
          Copy-Item -Force ..\Patcher.cs Program.cs
          
          Write-Host "=== Program.cs (first 5 lines) ==="
          Get-Content Program.cs | Select-Object -First 5
          
          dotnet build -c Release 2>&1 | Select-Object -Last 8
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[+] Built OK"
            $dllDir = if (Test-Path ..\deobfuscated) { "..\deobfuscated" } elseif (Test-Path ..\extracted) { "..\extracted" } else { "." }
            $dlls = @(Get-ChildItem $dllDir -Filter "*.dll" | Sort-Object Length -Descending)
            if ($dlls.Count -gt 0) {
              dotnet run -c Release -- $dlls[0].FullName 2>&1
            } else {
              Write-Host "[-] No DLL found"
            }
          } else {
            Write-Host "[-] Build failed"
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cracked-output
          path: |
            *_cracked.dll
            *_patched.dll
            Patcher.cs
            deobfuscated/
