name: Crack JQOneMatrixN

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Download EXE
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/RobinRegister/prmuzieo/releases/download/v1.0/JQOneMatrixN.exe" -OutFile "jqone.exe"
          Write-Host "[+] $( (Get-Item jqone.exe).length) bytes"

      - name: Extract Bundle + Scan
        shell: powershell
        run: |
          mkdir extractor -Force
          cd extractor
          dotnet new console --force 2>&1 | Out-Null
          Copy-Item ..\BundleExtractor.cs Program.cs -Force
          dotnet run -c Release -- ..\jqone.exe 2>&1
          cd ..
          
          if (Test-Path "extractor\extracted_asm\*.dll") {
            Move-Item extractor\extracted_asm\* extracted_asm\ -Force
          } elseif (-not (Test-Path "extracted_asm\*.dll")) {
            Write-Host "[-] Bundle extraction empty, trying sfextract..."
            dotnet tool install -g sfextract 2>&1 | Select-Object -Last 2
            sfextract jqone.exe -o extracted_asm 2>&1 | Select-Object -First 10
          }
          
          mkdir extracted_asm -Force
          Write-Host "=== Extracted Assemblies ==="
          $all = @(Get-ChildItem extracted_asm -Filter "*.dll" -ErrorAction SilentlyContinue | Sort-Object Length -Descending)
          $all | Select-Object Name, @{N='KB';E={[math]::Round($_.Length/1KB)}} | Format-Table -AutoSize
          
          # Check which are managed
          Write-Host "=== Managed vs Native ==="
          foreach ($d in $all) {
            $b = [IO.File]::ReadAllBytes($d.FullName)
            if ($b.Length -gt 512) {
              $pe = [BitConverter]::ToInt32($b, 0x3C)
              if ($pe -gt 0 -and $pe -lt $b.Length - 240) {
                $cli = $pe + 24 + 208
                if ($cli -lt $b.Length - 8) {
                  $rva = [BitConverter]::ToInt32($b, $cli)
                  $type = if ($rva -eq 0) { "NATIVE" } else { "MANAGED" }
                  $color = if ($type -eq "MANAGED") { "GREEN" } else { "RED" }
                  Write-Host "  $type $($d.Name) $([math]::Round($d.Length/1KB))KB"
                }
              }
            }
          }

      - name: Build + Run Patcher
        shell: powershell
        run: |
          $targets = @(Get-ChildItem extracted_asm -Filter "*.dll" -ErrorAction SilentlyContinue |
            Sort-Object Length -Descending)
          if ($targets.Count -eq 0) { Write-Host "[-] No DLLs"; exit 1 }
          
          Write-Host "[+] $($targets.Count) DLLs to patch"
          
          mkdir patcher -Force
          cd patcher
          dotnet new console --force 2>&1 | Out-Null
          dotnet add package dnlib 2>&1 | Out-Null
          Copy-Item ..\Patcher.cs Program.cs -Force
          dotnet build -c Release 2>&1 | Select-Object -Last 5
          
          if ($LASTEXITCODE -ne 0) { exit 1 }
          
          foreach ($d in $targets) {
            Write-Host "--- $($d.Name) ---"
            dotnet run -c Release -- $d.FullName 2>&1 | Select-Object -First 50
          }
          
          Write-Host "=== Patched DLLs ==="
          Get-ChildItem ..\extracted_asm -Filter "*_cracked*" -Recurse | Select-Object Name, Length

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cracked-output
          path: |
            *_cracked.dll
            extracted_asm/
